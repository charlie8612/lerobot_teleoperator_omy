name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Pre-install the CPU build of torch so the lerobot dependency does not
      # pull the multi-GB CUDA wheels (teleop/tests need no GPU).
      - name: Install CPU torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install package + dev tools
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Bandit (security)
        run: bandit -r src

      - name: Mypy
        run: mypy src

      - name: Pytest
        run: pytest -q
